org.gradle.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=192m -XX:ReservedCodeCacheSize=64m -XX:+UseSerialGC -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=false
android.useAndroidX=true
android.enableJetifier=true
# Pub cache (C:) and project (D:) are on different drives; incremental Kotlin fails across roots.
kotlin.incremental=false
org.gradle.parallel=false
org.gradle.workers.max=2
